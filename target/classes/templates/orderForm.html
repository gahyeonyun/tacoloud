<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Taco Cloud</title>

    <link rel="stylesheet"
          th:href="@{/styles.css}" />
</head>

<body>

<p>2023810044 윤가현</p>

<form method="POST"
      th:action="@{/orders}"
      th:object="${tacoOrder}">

    <h1>Order your taco creations!</h1>

    <img th:src="@{/images/TacoCloud.png}" />

    <br/>

    <a th:href="@{/design}">
        Design another taco
    </a>

    <div>

        <h3>Deliver my taco masterpieces to...</h3>

        <label>Name: </label>

        <input type="text"
               th:field="*{deliveryName}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('deliveryName')}"
              th:errors="*{deliveryName}">
        </span>

        <br/>

        <label>Street address: </label>

        <input type="text"
               th:field="*{deliveryStreet}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('deliveryStreet')}"
              th:errors="*{deliveryStreet}">
        </span>

        <br/>

        <label>City: </label>

        <input type="text"
               th:field="*{deliveryCity}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('deliveryCity')}"
              th:errors="*{deliveryCity}">
        </span>

        <br/>

        <label>State: </label>

        <input type="text"
               th:field="*{deliveryState}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('deliveryState')}"
              th:errors="*{deliveryState}">
        </span>

        <br/>

        <label>Zip code: </label>

        <input type="text"
               th:field="*{deliveryZip}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('deliveryZip')}"
              th:errors="*{deliveryZip}">
        </span>

        <br/>

        <h3>Here's how I'll pay...</h3>

        <label>Credit Card #: </label>

        <input type="text"
               th:field="*{ccNumber}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('ccNumber')}"
              th:errors="*{ccNumber}">
        </span>

        <br/>

        <label>Expiration: </label>

        <input type="text"
               th:field="*{ccExpiration}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('ccExpiration')}"
              th:errors="*{ccExpiration}">
        </span>

        <br/>

        <label>CVV: </label>

        <input type="text"
               th:field="*{ccCVV}" />

        <span class="validationError"
              th:if="${#fields.hasErrors('ccCVV')}"
              th:errors="*{ccCVV}">
        </span>

        <br/>

        <input type="submit"
               value="Submit Order" />

    </div>

</form>
<form method="POST" th:action="@{/logout}">
    <input type="submit" value="Logout"/>
</form>
</body>
</html>
