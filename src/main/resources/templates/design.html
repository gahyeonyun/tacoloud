<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Taco Cloud</title>
</head>
<body>

<h1>Design your taco!</h1>
<h2>Feelin' hungry, <span th:text="${user.fullname}">NAME</span>?</h2>
<img th:src="@{/images/TacoCloud.png}" width="300"/>

<form method="POST" th:action="@{/logout}">
    <input type="submit" value="Logout"/>
</form>

<form method="POST" th:object="${taco}" th:action="@{/design}">
    <div>
        <h3>Designate your wrap:</h3>
        <div th:each="ingredient : ${wrap}">
            <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}"/>
            <span th:text="${ingredient.name}">INGREDIENT</span><br/>
        </div>
    </div>

    <div>
        <h3>Pick your protein:</h3>
        <div th:each="ingredient : ${protein}">
            <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}"/>
            <span th:text="${ingredient.name}">INGREDIENT</span><br/>
        </div>
    </div>

    <div>
        <h3>Choose your cheese:</h3>
        <div th:each="ingredient : ${cheese}">
            <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}"/>
            <span th:text="${ingredient.name}">INGREDIENT</span><br/>
        </div>
    </div>

    <div>
        <h3>Determine your veggies:</h3>
        <div th:each="ingredient : ${veggies}">
            <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}"/>
            <span th:text="${ingredient.name}">INGREDIENT</span><br/>
        </div>
    </div>

    <div>
        <h3>Select your sauce:</h3>
        <div th:each="ingredient : ${sauce}">
            <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}"/>
            <span th:text="${ingredient.name}">INGREDIENT</span><br/>
        </div>
    </div>

    <div>
        <h3>Name your taco creation:</h3>
        <input type="text" th:field="*{name}"/>
        <br/>
        <button type="submit">Submit Your Taco</button>
    </div>
</form>

</body>
</html>
